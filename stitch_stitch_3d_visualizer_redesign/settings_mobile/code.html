<!DOCTYPE html>

<html class="dark" lang="en"><head>

<title>3D Product Visualizer - Settings</title>

                    "surface-variant": "#2d3449",

            "spacing": {

<style type="text/tailwindcss">
        @layer utilities {
            .glass-panel {
                @apply bg-surface-container-highest/60 backdrop-blur-[20px] border border-white/10 shadow-[0_10px_30px_rgba(0,0,0,0.3)];
            }
            .glass-button {
                @apply bg-primary/80 text-on-primary backdrop-blur-md rounded-full flex items-center justify-center px-4 py-2 font-label-sm text-label-sm transition-all hover:bg-primary/90 active:scale-95;
            }
            .glass-button-secondary {
                @apply bg-white/10 text-on-surface backdrop-blur-md rounded-full flex items-center justify-center px-4 py-2 font-label-sm text-label-sm transition-all hover:bg-white/20 active:scale-95;
            }
            .glass-icon-btn {
                @apply w-10 h-10 rounded-full bg-white/5 border border-white/5 flex items-center justify-center text-on-surface hover:bg-white/10 transition-colors;
            }
            .settings-row {
                @apply flex items-center justify-between py-3 border-b border-white/5 last:border-0;
            }
        }
        
        /* Custom Range Slider */
        input[type=range] {
            -webkit-appearance: none;
            @apply w-full bg-transparent h-6;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            @apply h-4 w-4 rounded-full bg-primary shadow-md mt-[-6px] cursor-pointer;
        }
        input[type=range]::-webkit-slider-runnable-track {
            @apply w-full h-1 bg-white/20 rounded-full;
        }
        
        /* Custom Toggle */
        .toggle-checkbox:checked {
            @apply right-0 border-primary bg-primary;
            right: 0;
            border-color: #9ccaff;
        }
        .toggle-checkbox:checked + .toggle-label {
            @apply bg-primary/20;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background h-screen w-screen overflow-hidden relative font-body-md text-body-md select-none">
<!-- Faux 3D Background Canvas -->
<div class="absolute inset-0 z-0">
<img alt="3D abstract rendering of a sleek minimal object in a dark environment with soft dramatic studio lighting" class="w-full h-full object-cover opacity-30 blur-sm scale-105" data-alt="3D abstract rendering of a sleek minimal object in a dark environment with soft dramatic studio lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD1hHegs_DVFzsZIwa6X3-iRMvX_ywmQshhMUjieW180WTRuGz99zEwMoP3AfK2YABx8rviuM6-uD-xUS8wE0N04H1KPUMZGfEpXw7HQfDyjXGSVhMxG6p6RGVz2DRyKCYFbG2kZV0gEHjZeWwRix6hmmjuCrjTSObjswDQ0q9H4Vvy5TW-2uOAWcnqh85fKJ7uOKTxN4WyJH0UJjrXRVvNYLs24zE2wAOqPYGcOjLr241fG1TaWE_PBpVIYwvJUt1Z1uLxb61ts-1k"/>
</div>
<!-- Top App Bar (From Shared Components) -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-6 py-2 bg-slate-900/60 backdrop-blur-md border border-white/10 shadow-xl rounded-full mx-4 mt-4" style="width: calc(100% - 32px);">
<button class="w-8 h-8 flex items-center justify-center text-blue-500 dark:text-blue-400 hover:bg-white/10 transition-colors active:scale-95 transition-transform duration-200 rounded-full">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">menu</span>
</button>
<h1 class="text-base font-bold tracking-tighter text-slate-100 font-inter antialiased tracking-tight text-sm">Visualizer</h1>
<button class="w-8 h-8 flex items-center justify-center text-blue-400 hover:bg-white/10 transition-colors active:scale-95 transition-transform duration-200 rounded-full">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">settings</span>
</button>
</header>
<!-- Bottom Sheet Container -->
<main class="absolute bottom-0 left-0 right-0 z-40 px-container-padding pb-container-padding flex flex-col justify-end h-full md:hidden pointer-events-none">
<div class="glass-panel rounded-t-xl rounded-b-xl w-full max-h-[751px] overflow-y-auto pointer-events-auto flex flex-col">
<!-- Drag Handle / Header -->
<div class="w-full flex justify-center py-3 sticky top-0 bg-surface-container-highest/80 backdrop-blur-md z-10 rounded-t-xl border-b border-white/5">
<div class="w-12 h-1 bg-white/20 rounded-full"></div>
</div>
<div class="p-4 space-y-6">
<!-- Share Section -->
<section>
<h2 class="font-header-caps text-header-caps text-on-surface-variant mb-3 uppercase">Share Configuration</h2>
<div class="flex items-center gap-element-gap justify-between bg-surface-container/50 p-3 rounded-lg border border-white/5">
<button class="glass-icon-btn">
<span class="material-symbols-outlined text-[20px]">share</span>
</button>
<button class="glass-icon-btn">
<span class="material-symbols-outlined text-[20px]">link</span>
</button>
<button class="glass-icon-btn">
<span class="material-symbols-outlined text-[20px]">mail</span>
</button>
<button class="glass-icon-btn">
<span class="material-symbols-outlined text-[20px]">chat</span>
</button>
</div>
</section>
<!-- Email Config -->
<section>
<div class="bg-surface-container/50 p-4 rounded-lg border border-white/5">
<p class="font-body-md text-body-md text-on-surface-variant mb-4">Send a detailed link of this exact material and lighting setup to your inbox.</p>
<button class="glass-button-secondary w-full">
<span class="material-symbols-outlined mr-2 text-[18px]">send</span>
                            Email My Configuration
                        </button>
</div>
</section>
<!-- Environment Controls -->
<section>
<h2 class="font-header-caps text-header-caps text-on-surface-variant mb-3 uppercase">Environment</h2>
<div class="bg-surface-container/50 rounded-lg border border-white/5 px-4">
<!-- Brightness Slider -->
<div class="settings-row flex-col items-start gap-2 py-4">
<div class="flex justify-between w-full">
<span class="font-label-sm text-label-sm text-on-surface">Brightness</span>
<span class="font-value-mono text-value-mono text-primary">1.1x</span>
</div>
<div class="w-full flex items-center gap-3">
<span class="material-symbols-outlined text-on-surface-variant text-[16px]">light_mode</span>
<input class="flex-1" max="200" min="0" type="range" value="110"/>
<span class="material-symbols-outlined text-on-surface-variant text-[16px]">wb_sunny</span>
</div>
</div>
<!-- Shadows Toggle -->
<div class="settings-row py-4">
<div class="flex flex-col">
<span class="font-label-sm text-label-sm text-on-surface">Shadows &amp; Light</span>
<span class="font-value-mono text-value-mono text-on-surface-variant mt-1">Enable raytraced shadows</span>
</div>
<div class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
<input checked="" class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-primary border-4 appearance-none cursor-pointer border-transparent" id="toggle" name="toggle" style="right: 0;" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-5 rounded-full bg-primary/30 cursor-pointer" for="toggle"></label>
</div>
</div>
</div>
</section>
<!-- Render Quality -->
<section>
<h2 class="font-header-caps text-header-caps text-on-surface-variant mb-3 uppercase">Render Quality</h2>
<div class="bg-surface-container/50 rounded-lg border border-white/5 p-1 flex">
<button class="flex-1 py-1.5 rounded text-center font-label-sm text-label-sm text-on-surface-variant hover:text-on-surface transition-colors">Low</button>
<button class="flex-1 py-1.5 rounded text-center font-label-sm text-label-sm text-on-surface-variant hover:text-on-surface transition-colors border-x border-white/5">Med</button>
<button class="flex-1 py-1.5 rounded bg-white/10 text-center font-label-sm text-label-sm text-on-surface shadow-sm border border-white/10">High</button>
</div>
</section>
<!-- Primary Action -->
<div class="pt-2 pb-4">
<button class="glass-button w-full h-12">
<span class="material-symbols-outlined mr-2 text-[20px]">compare</span>
                        Enable Comparison
                    </button>
</div>
</div>
</div>
</main>
<!-- Bottom Nav Bar (From Shared Components) -->
<!-- Suppressed due to active settings overlay per logic guidelines, but included hidden for completeness if viewport resizes -->
<nav aria-label="Bottom Navigation" class="hidden fixed bottom-0 left-0 right-0 z-50 justify-center items-center pb-safe">
<div class="bg-slate-900/60 backdrop-blur-xl border border-white/10 shadow-2xl rounded-full mx-auto mb-8 w-max px-2 flex">
<!-- items would go here based on JSON -->
</div>
</nav>
</body></html>
